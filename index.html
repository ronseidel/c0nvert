<script>
/* THEME INIT — runs in head before body paints. Defaults to user's system
   theme. If user has previously overridden it in this browser, honor that.
   Sets data-theme + inline <html> styles so nothing flashes. */
(function() {
  var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  var systemTheme = prefersDark ? 'dark' : 'light';
  var saved = null;
  try { saved = localStorage.getItem('c0nvert-theme'); } catch(e) {}
  var theme = (saved === 'light' || saved === 'dark') ? saved : systemTheme;
  document.documentElement.dataset.theme = theme;
  if (theme === 'dark') {
    document.documentElement.style.background = '#0A0F0D';
    document.documentElement.style.color = '#E4F3EE';
  } else {
    document.documentElement.style.background = '#F9F9F9';
    document.documentElement.style.color = '#034D32';
  }
})();
</script>

:root {

}

}
* { box-sizing: border-box; }
html, body {

}

}
.wrap {

  flex-direction: column;

.header-right {

  gap: 12px;

.theme-toggle {
  flex-shrink: 0;

  height: 40px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
}
.theme-toggle:hover {

}

  width: 18px;
  height: 18px;

.theme-toggle .theme-icon { display: none; }

html[data-theme="dark"] .theme-toggle .theme-icon-light { display: block; }
.dropzone {
  border: 2px dashed var(--border);
  border-radius: 16px;
  padding: 64px 24px;
  text-align: center;
  background: var(--surface);
  transition: border-color 120ms, background 120ms, transform 80ms;
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 280px;
}
.dropzone:hover, .dropzone.drag {

  background: var(--accent-bg);

.dropzone:active { transform: scale(0.998); }

  font-size: 17px;

.formats-sep {

<script>
// ============ THEME MANAGER ============
// Binary light↔dark toggle. App opens in system theme. Click flips to the
// opposite; click again flips back. No 3-state auto mode. Layers updated:
//   1. html[data-theme] — drives CSS vars
//   2. inline style on <html> + <body> — 4-layer fallback
//   3. <meta name="theme-color"> — mobile browser chrome

function getCurrentTheme() {
  return document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
}

function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  try { localStorage.setItem('c0nvert-theme', theme); } catch {}
  const bg = theme === 'dark' ? '#0A0F0D' : '#F9F9F9';
  const fg = theme === 'dark' ? '#E4F3EE' : '#034D32';
  document.documentElement.style.background = bg;
  document.documentElement.style.color = fg;
  if (document.body) {
    document.body.style.background = bg;
    document.body.style.color = fg;
  }
  // Update the non-media theme-color tag for mobile chrome bar
  let metaTc = document.querySelector('meta[name="theme-color"]:not([media])');
  if (!metaTc) {
    metaTc = document.createElement('meta');
    metaTc.name = 'theme-color';
    document.head.appendChild(metaTc);
  }
  metaTc.content = bg;
}

function toggleTheme() {
  applyTheme(getCurrentTheme() === 'dark' ? 'light' : 'dark');
}

// Sync body + meta with whatever the head script set on <html>
applyTheme(getCurrentTheme());

// Wire up the toggle button
document.querySelector('[data-theme-toggle]')?.addEventListener('click', toggleTheme);

// ============ PDF.JS WORKER SETUP ============
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

// ============ STATE ============
const state = {
  files: [], // { id, file, category, ext, options, status, results }
  nextId: 1,
};

// ============ FORMAT DETECTION ============
const IMAGE_EXTS = ['png', 'jpg', 'jpeg', 'webp', 'gif', 'bmp'];
const HEIC_EXTS = ['heic', 'heif'];
const SVG_EXTS = ['svg'];
const PDF_EXTS = ['pdf'];
const AUDIO_EXTS = ['mp3', 'wav', 'aif', 'aiff', 'm4a', 'ogg', 'flac', 'aac', 'opus'];
const VIDEO_EXTS = ['mov', 'mp4', 'webm', 'mkv', 'avi', 'flv', 'wmv', 'm4v'];

function getExt(filename) {
  const m = filename.toLowerCase().match(/\.([^.]+)$/);
  return m ? m[1] : '';
}

function categorize(file) {
  const ext = getExt(file.name);
  if (HEIC_EXTS.includes(ext)) return 'image';
  if (SVG_EXTS.includes(ext)) return 'svg';
  if (IMAGE_EXTS.includes(ext)) return 'image';
  if (PDF_EXTS.includes(ext)) return 'pdf';
  if (AUDIO_EXTS.includes(ext)) return 'audio';
  if (VIDEO_EXTS.includes(ext)) return 'video';
  if (file.type.startsWith('image/')) return 'image';
  if (file.type.startsWith('audio/')) return 'audio';
  if (file.type.startsWith('video/')) return 'video';
  if (file.type === 'application/pdf') return 'pdf';
  return 'unknown';
}

function defaultOptions(category, ext) {
  switch (category) {
    case 'image':
      return { formats: ['png'], quality: 0.92 };
    case 'svg':
      return { format: 'png', sizes: [256, 512], bgColor: 'transparent', customBg: '#FFFFFF', paddingH: 0, paddingV: 0, aspectMode: 'match' };
    case 'pdf':
      return { format: 'png', scale: 2 };
    case 'audio':
      return { formats: ['wav'], mp3Bitrate: 192 };
    case 'video':
      // Smart default: target something other than the input format
      return { formats: [smartVideoTarget(ext)], mp3Bitrate: 192 };
    default:
      return {};
  }
}

function smartVideoTarget(ext) {
  if (ext === 'mp4' || ext === 'm4v') return 'mov';
  if (ext === 'mov') return 'mp4';
  return 'mp4'; // default for webm, mkv, etc.
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
}

// ============ FILE INTAKE ============
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');

dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => addFiles(e.target.files));

['dragenter', 'dragover'].forEach(ev => {
  dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add('drag'); });
});
['dragleave', 'drop'].forEach(ev => {
  dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove('drag'); });
});
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
});
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('drop', e => e.preventDefault());

document.getElementById('add-more').addEventListener('click', () => fileInput.click());
document.getElementById('clear-all').addEventListener('click', () => {
  state.files = [];
  renderQueue();
});
document.getElementById('convert-all').addEventListener('click', convertAll);

function addFiles(fileList) {
  Array.from(fileList).forEach(file => {
    const ext = getExt(file.name);
    const category = categorize(file);
    const entry = {
      id: state.nextId++,
      file,
      ext,
      category,
      options: defaultOptions(category, ext),
      status: 'ready',
      results: [],

    state.files.push(entry);
    // Preload SVG so preview is instant

async function loadSvgImage(f) {
  if (f._svgImg) return f._svgImg;
  const text = await f.file.text();

  const dataUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(text);
  f._svgImg = await loadImage(dataUrl);
  return f._svgImg;
}

function removeFile(id) {
  state.files = state.files.filter(f => f.id !== id);
  renderQueue();
}

const bulkEl = document.getElementById('bulk-actions');

  queueEl.innerHTML = '';
  bulkEl.style.display = state.files.length ? 'flex' : 'none';

  state.files.forEach(f => {

    card.innerHTML = renderFileCard(f);
    queueEl.appendChild(card);
    bindFileCard(card, f);
  });
}

function renderFileCard(f) {
  return `

      <div class="file-icon">${(f.ext || '?').toUpperCase().slice(0, 4)}</div>

  if (f.status === 'done') return `✓ ${f.statusText || 'done'}`;

            <select data-opt="format">
              <option value="png" ${f.options.format === 'png' ? 'selected' : ''}>PNG per page</option>
              <option value="jpg" ${f.options.format === 'jpg' ? 'selected' : ''}>JPG per page</option>
            </select>
          </div>
          <div class="opt-group">
            <label class="opt-label">Resolution</label>
            <select data-opt="scale">
              <option value="1" ${f.options.scale == 1 ? 'selected' : ''}>1x · standard</option>
              <option value="2" ${f.options.scale == 2 ? 'selected' : ''}>2x · retina</option>
              <option value="3" ${f.options.scale == 3 ? 'selected' : ''}>3x · print</option>
            </select>
          </div>
        </div>`;
    case 'audio': {
      const formats = f.options.formats || ['wav'];
      return `
        <div class="file-options">
          <div class="opt-group" style="flex:1; min-width:240px;">
            <label class="opt-label">Output formats</label>
            <div class="format-list">
              <label class="format-row">
                <input type="checkbox" data-format-check value="wav" ${formats.includes('wav') ? 'checked' : ''}>
                <span class="format-name">WAV</span>
                <span class="format-desc">Lossless, larger files</span>
              </label>
              <label class="format-row">
                <input type="checkbox" data-format-check value="mp3" ${formats.includes('mp3') ? 'checked' : ''}>
                <span class="format-name">MP3</span>
                <span class="format-desc">Compressed, universal compatibility</span>
              </label>
            </div>
          </div>
          ${formats.includes('mp3') ? `
          <div class="opt-group">
            <label class="opt-label">MP3 bitrate</label>
            <select data-opt="mp3Bitrate">
              <option value="128" ${f.options.mp3Bitrate == 128 ? 'selected' : ''}>128 kbps</option>
              <option value="192" ${f.options.mp3Bitrate == 192 ? 'selected' : ''}>192 kbps</option>
              <option value="256" ${f.options.mp3Bitrate == 256 ? 'selected' : ''}>256 kbps</option>
              <option value="320" ${f.options.mp3Bitrate == 320 ? 'selected' : ''}>320 kbps</option>
            </select>
          </div>` : ''}
        </div>`;
    }
    case 'video': {
      const inGroup = ['mp4', 'mov', 'm4v'];
      const formats = f.options.formats || [];
      const allOptions = ['mp4', 'mov', 'webm'].filter(o => o !== f.ext);
      return `
        <div class="file-options">
          <div class="opt-group" style="flex:1; min-width:280px;">
            <label class="opt-label">Output formats</label>
            <div class="format-list">
              ${allOptions.map(fmt => {
                const willStreamCopy = inGroup.includes(f.ext) && inGroup.includes(fmt);
                const desc = willStreamCopy
                  ? '<span style="color:var(--accent)">●</span> Container swap — instant, lossless'
                  : '<span style="color:var(--warn)">●</span> Re-encode — needs deployed COOP/COEP headers';
                return `
                  <label class="format-row">
                    <input type="checkbox" data-format-check value="${fmt}" ${formats.includes(fmt) ? 'checked' : ''}>
                    <span class="format-name">${fmt.toUpperCase()}</span>
                    <span class="format-desc">${desc}</span>
                  </label>`;
              }).join('')}
            </div>
          </div>
        </div>
        ${f.file.size > 200 * 1024 * 1024 ? `
        <div class="banner warn">
          <span class="banner-icon">⚠</span>
          <span>Large file (${fmtSize(f.file.size)}). Re-encoding may run out of browser memory; container swap should still work.</span>
        </div>` : ''}`;
    }
    default:
      return `
        <div class="banner warn">
          <span class="banner-icon">⚠</span>
          <span>Unrecognized file type. Supported: images, SVG, PDF, audio.</span>
        </div>`;
  }
}

function renderActions(f) {
  if (f.category === 'unknown') return '';
  if (f.status === 'done' && f.results.length > 0) {
    return `
      <button class="btn btn-primary" data-download>Download${f.results.length > 1 ? ` (${f.results.length} files)` : ''}</button>
      <button class="btn btn-secondary" data-reconvert>Convert again</button>
    `;
  }
  return `<button class="btn btn-primary" data-convert ${f.status === 'converting' ? 'disabled' : ''}>Convert</button>`;
}

function bindFileCard(card, f) {
  // Remove
  card.querySelector('[data-remove]').addEventListener('click', () => removeFile(f.id));

  // Convert / download / reconvert
  card.querySelector('[data-convert]')?.addEventListener('click', () => convertFile(f));
  card.querySelector('[data-download]')?.addEventListener('click', () => downloadResults(f));
  card.querySelector('[data-reconvert]')?.addEventListener('click', () => {
    f.status = 'ready';
    f.results = [];
    renderQueue();
  });

  // Generic option binders (NOT padding — those are wired separately for drag perf)
  card.querySelectorAll('[data-opt]').forEach(input => {
    const key = input.dataset.opt;
    input.addEventListener('input', e => {
      let val = e.target.value;
      if (key === 'quality') val = parseInt(val) / 100;
      else if (key === 'scale' || key === 'mp3Bitrate') val = parseInt(val);
      f.options[key] = val;
      // Re-render: format changes affect available sub-options
      if (key === 'format' || key === 'quality') renderQueue();
    });
  });

  // Format checkboxes (multi-select for image/audio/video)
  card.querySelectorAll('[data-format-check]').forEach(check => {
    check.addEventListener('change', e => {
      const fmt = e.target.value;
      if (!f.options.formats) f.options.formats = [];
      if (e.target.checked) {
        if (!f.options.formats.includes(fmt)) f.options.formats.push(fmt);
      } else {
        f.options.formats = f.options.formats.filter(x => x !== fmt);
      }
      renderQueue();
    });
  });

  // Padding sliders + quality slider — update inline without re-rendering, so drag stays attached
  card.querySelectorAll('[data-pad-slider]').forEach(slider => {
    const key = slider.dataset.padSlider;
    slider.addEventListener('input', e => {
      const raw = parseInt(e.target.value);
      const val = (key === 'quality') ? raw / 100 : raw;
      f.options[key] = val;
      // Update value label inline
      const label = card.querySelector(`[data-pad-value="${key}"]`);
      if (label) label.textContent = raw;
      // Re-render preview canvas in place (only relevant for SVG)
      const previewCanvas = card.querySelector('[data-svg-preview]');
      if (previewCanvas && f._svgImg && f.options.sizes && f.options.sizes.length > 0) {
        const previewSize = Math.max(...f.options.sizes);
        try { renderSvgToCanvas(f, previewCanvas, previewSize); } catch {}
      }
    });
  });

  // SVG sizes
  card.querySelectorAll('[data-size]').forEach(el => {
    el.addEventListener('click', () => {
      const size = parseInt(el.dataset.size);
      const idx = f.options.sizes.indexOf(size);
      if (idx >= 0) f.options.sizes.splice(idx, 1);
      else f.options.sizes.push(size);
      f.options.sizes.sort((a, b) => a - b);
      renderQueue();
    });
  });

  // SVG aspect mode toggle
  card.querySelectorAll('[data-aspect]').forEach(el => {
    el.addEventListener('click', () => {
      f.options.aspectMode = el.dataset.aspect;
      renderQueue();
    });
  });

  // SVG/image bg preset chips
  card.querySelectorAll('[data-bg]').forEach(el => {
    el.addEventListener('click', () => {
      f.options.bgColor = el.dataset.bg;
      renderQueue();
    });
  });

  // Custom color: input is positioned over the button so it captures clicks itself
  const customInput = card.querySelector('[data-custom-color]');
  if (customInput) {
    customInput.addEventListener('input', e => {
      f.options.customBg = e.target.value;
      f.options.bgColor = 'custom';
      renderQueue();
    });
  }

  // SVG live preview (initial render)
  const previewCanvas = card.querySelector('[data-svg-preview]');
  if (previewCanvas && f._svgImg && f.options.sizes.length > 0) {
    const previewSize = Math.max(...f.options.sizes);
    try {
      renderSvgToCanvas(f, previewCanvas, previewSize);
    } catch (err) {
      console.warn('Preview render failed', err);
    }
  }
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function setStatus(f, status, text) {
  f.status = status;
  f.statusText = text;
  renderQueue();
}

// ============ CONVERSION DISPATCH ============
async function convertFile(f) {
  setStatus(f, 'converting', 'starting...');
  f.results = [];
  try {
    switch (f.category) {
      case 'image':
        if (HEIC_EXTS.includes(f.ext)) await convertHeic(f);
        else await convertImage(f);
        break;
      case 'svg': await convertSvg(f); break;
      case 'pdf': await convertPdf(f); break;
      case 'audio': await convertAudio(f); break;
      case 'video': await convertVideo(f); break;
      default: throw new Error('Unsupported category');
    }
    setStatus(f, 'done', `${f.results.length} file${f.results.length === 1 ? '' : 's'}`);
  } catch (err) {
    console.error(err);
    setStatus(f, 'error', err.message || 'failed');
  }
}

async function convertAll() {
  for (const f of state.files) {
    if (f.status === 'ready' && f.category !== 'unknown') {
      await convertFile(f);
    }
  }
}

// ============ IMAGE CONVERTER ============
async function convertImage(f) {
  const formats = f.options.formats || ['png'];
  if (formats.length === 0) throw new Error('Pick at least one output format');

  setStatus(f, 'converting', 'reading image...');
  const dataUrl = await readAsDataURL(f.file);
  const img = await loadImage(dataUrl);
  const baseName = stripExt(f.file.name);

  for (const fmt of formats) {
    setStatus(f, 'converting', `encoding ${fmt}...`);
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    if (fmt === 'jpg') {
      // JPG has no alpha — fill white before drawing
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    ctx.drawImage(img, 0, 0);
    const blob = await canvasToBlob(canvas, fmt, f.options.quality);
    f.results.push({ name: `${baseName}.${fmt}`, blob });
  }
}

// ============ SVG CONVERTER ============
// Computes output dimensions for a given longest-edge size, given the svg's
// natural aspect ratio and the user's aspect mode.
function svgOutputDims(svgImg, size, aspectMode) {
  if (aspectMode === 'square') return { w: size, h: size };
  const aspect = svgImg.naturalWidth / svgImg.naturalHeight;
  if (aspect >= 1) return { w: size, h: Math.round(size / aspect) };
  return { w: Math.round(size * aspect), h: size };
}

// Resolve the user's effective bg color (transparent | hex | "custom" → customBg)
function svgEffectiveBg(opts) {
  if (opts.bgColor === 'transparent') return null;
  if (opts.bgColor === 'custom') return opts.customBg;
  return opts.bgColor;
}

// Renders the SVG to the given canvas at output size, applying padding + bg.
// Used by both the live preview and the actual conversion.
function renderSvgToCanvas(f, canvas, size) {
  const { w: outW, h: outH } = svgOutputDims(f._svgImg, size, f.options.aspectMode);
  canvas.width = outW;
  canvas.height = outH;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, outW, outH);

  // Background fill (jpg has no alpha so always fill — fall back to white if user picked transparent)
  let bg = svgEffectiveBg(f.options);
  if (!bg && f.options.format === 'jpg') bg = '#FFFFFF';
  if (bg) {
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, outW, outH);
  }

  // Inner area after padding (each side gets the % applied)
  const padX = (f.options.paddingH / 100) * outW;
  const padY = (f.options.paddingV / 100) * outH;
  const innerW = Math.max(1, outW - 2 * padX);
  const innerH = Math.max(1, outH - 2 * padY);

  // Fit the SVG inside the inner rectangle while preserving its aspect
  const svgAspect = f._svgImg.naturalWidth / f._svgImg.naturalHeight;
  const innerAspect = innerW / innerH;
  let drawW, drawH;
  if (svgAspect > innerAspect) {
    drawW = innerW;
    drawH = innerW / svgAspect;
  } else {
    drawH = innerH;
    drawW = innerH * svgAspect;
  }
  const dx = (outW - drawW) / 2;
  const dy = (outH - drawH) / 2;
  ctx.drawImage(f._svgImg, dx, dy, drawW, drawH);
}

async function convertSvg(f) {
  if (f.options.sizes.length === 0) throw new Error('Pick at least one size');
  setStatus(f, 'converting', 'reading svg...');
  await loadSvgImage(f);

  for (const size of f.options.sizes) {
    setStatus(f, 'converting', `rendering ${size}px...`);
    const canvas = document.createElement('canvas');
    renderSvgToCanvas(f, canvas, size);
    const outBlob = await canvasToBlob(canvas, f.options.format, 0.95);
    const baseName = stripExt(f.file.name);
    f.results.push({ name: `${baseName}-${size}.${f.options.format}`, blob: outBlob });
  }
}

// ============ PDF CONVERTER ============
async function convertPdf(f) {
  if (!window.pdfjsLib) throw new Error('PDF library not loaded');
  setStatus(f, 'converting', 'loading pdf...');
  const buf = await f.file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const pageCount = pdf.numPages;
  const baseName = stripExt(f.file.name);
  const padLen = String(pageCount).length;

  for (let i = 1; i <= pageCount; i++) {
    setStatus(f, 'converting', `page ${i}/${pageCount}...`);
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: f.options.scale });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    if (f.options.format === 'jpg') {
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    await page.render({ canvasContext: ctx, viewport }).promise;
    const blob = await canvasToBlob(canvas, f.options.format, 0.92);
    const pageNum = String(i).padStart(padLen, '0');
    f.results.push({ name: `${baseName}-page-${pageNum}.${f.options.format}`, blob });
  }
}

// ============ AUDIO CONVERTER ============
let lameLoaded = null;
async function loadLame() {
  if (lameLoaded) return lameLoaded;
  lameLoaded = loadScript('https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js')
    .then(() => {
      if (!window.lamejs) throw new Error('lamejs failed to initialize');
      return window.lamejs;
    });
  return lameLoaded;
}

async function convertAudio(f) {
  const formats = f.options.formats || ['wav'];
  if (formats.length === 0) throw new Error('Pick at least one output format');

  setStatus(f, 'converting', 'reading audio...');
  const buf = await f.file.arrayBuffer();
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const ctx = new AudioCtx();
  let decoded;

  const isAiff = f.ext === 'aif' || f.ext === 'aiff';
  try {
    if (isAiff) {
      setStatus(f, 'converting', 'parsing aiff...');
      decoded = await parseAiff(buf, ctx);
    } else {
      setStatus(f, 'converting', 'decoding audio...');
      decoded = await ctx.decodeAudioData(buf.slice(0));
    }
  } catch (err) {
    console.error('Audio decode error:', err);
    throw new Error(`Couldn't decode this ${f.ext.toUpperCase()} file. The format may not be supported in your browser.`);
  }

  const baseName = stripExt(f.file.name);

  for (const fmt of formats) {
    if (fmt === 'wav') {
      setStatus(f, 'converting', 'encoding wav...');
      const wav = encodeWav(decoded);
      f.results.push({ name: `${baseName}.wav`, blob: new Blob([wav], { type: 'audio/wav' }) });
    } else if (fmt === 'mp3') {
      setStatus(f, 'converting', 'loading mp3 encoder...');
      await loadLame();
      setStatus(f, 'converting', 'encoding mp3...');
      const mp3 = encodeMp3(decoded, f.options.mp3Bitrate);
      f.results.push({ name: `${baseName}.mp3`, blob: new Blob([mp3], { type: 'audio/mp3' }) });
    }
  }
  ctx.close && ctx.close();
}

// ============ AIFF PARSER ============
// AIFF/AIFC container parser. Browser decodeAudioData has unreliable AIFF support
// (works in Safari, often fails in Chrome/Firefox). Standard PCM AIFF is simple
// enough to parse manually — chunked structure with COMM (format) and SSND (samples).
async function parseAiff(arrayBuffer, audioContext) {
  const view = new DataView(arrayBuffer);
  const total = arrayBuffer.byteLength;
  if (total < 12) throw new Error('AIFF too short');

  // FORM <size> AIFF/AIFC header
  if (readFourCC(view, 0) !== 'FORM') throw new Error('Not an AIFF file (no FORM)');
  const formType = readFourCC(view, 8);
  if (formType !== 'AIFF' && formType !== 'AIFC') throw new Error('Not AIFF/AIFC: ' + formType);

  let numChannels = 0, numFrames = 0, bitDepth = 0, sampleRate = 0;
  let pcmData = null;
  let compressionType = 'NONE';

  let offset = 12;
  while (offset <= total - 8) {
    const chunkId = readFourCC(view, offset);
    const chunkSize = view.getUint32(offset + 4, false); // big-endian
    const chunkStart = offset + 8;

    if (chunkId === 'COMM') {
      numChannels = view.getUint16(chunkStart, false);
      numFrames = view.getUint32(chunkStart + 2, false);
      bitDepth = view.getUint16(chunkStart + 6, false);
      sampleRate = readExtended80(view, chunkStart + 8);
      if (formType === 'AIFC' && chunkSize >= 22) {
        compressionType = readFourCC(view, chunkStart + 18);
      }
    } else if (chunkId === 'SSND') {
      const dataOffset = view.getUint32(chunkStart, false);
      // const blockSize = view.getUint32(chunkStart + 4, false); // typically 0
      const sampleStart = chunkStart + 8 + dataOffset;
      const sampleLen = chunkSize - 8 - dataOffset;
      pcmData = new Uint8Array(arrayBuffer, sampleStart, sampleLen);
    }

    // Chunks are word-aligned; advance with even-padding.
    offset = chunkStart + chunkSize + (chunkSize & 1);
  }

  if (!pcmData) throw new Error('AIFF missing SSND chunk');
  if (!numChannels || !sampleRate) throw new Error('AIFF missing COMM chunk');

  const channels = aiffPcmToFloat32(pcmData, numChannels, bitDepth, numFrames, compressionType);

  const audioBuffer = audioContext.createBuffer(numChannels, numFrames, sampleRate);
  for (let c = 0; c < numChannels; c++) audioBuffer.copyToChannel(channels[c], c);
  return audioBuffer;
}

function readFourCC(view, offset) {
  return String.fromCharCode(
    view.getUint8(offset),
    view.getUint8(offset + 1),
    view.getUint8(offset + 2),
    view.getUint8(offset + 3),
  );
}

// IEEE 754 80-bit extended precision (used by AIFF for sample rate). Big-endian.
function readExtended80(view, offset) {
  const expHi = view.getUint16(offset, false);
  const sign = (expHi & 0x8000) ? -1 : 1;
  const exp = expHi & 0x7FFF;
  const hi = view.getUint32(offset + 2, false);
  const lo = view.getUint32(offset + 6, false);
  if (exp === 0 && hi === 0 && lo === 0) return 0;
  if (exp === 0x7FFF) return sign * (hi || lo ? NaN : Infinity);
  // 80-bit extended has explicit leading 1 bit (no implicit one like 32/64-bit IEEE)
  const mantissa = hi * 0x100000000 + lo;
  return sign * mantissa * Math.pow(2, exp - 16383 - 63);
}

function aiffPcmToFloat32(pcm, numChannels, bitDepth, numFrames, compressionType) {
  const ct = compressionType.toLowerCase();
  // Compression types we handle:
  //   NONE / twos    → signed PCM, big-endian (standard AIFF)
  //   sowt           → signed PCM, little-endian (byte-swapped)
  //   fl32 / FL32    → 32-bit IEEE float, big-endian
  //   fl64 / FL64    → 64-bit IEEE float, big-endian
  const isLE = (ct === 'sowt');
  const isFloat32 = (ct === 'fl32');
  const isFloat64 = (ct === 'fl64');

  const channels = [];
  for (let c = 0; c < numChannels; c++) channels.push(new Float32Array(numFrames));

  const view = new DataView(pcm.buffer, pcm.byteOffset, pcm.byteLength);

  if (isFloat32) {
    const stride = numChannels * 4;
    for (let i = 0; i < numFrames; i++) {
      for (let c = 0; c < numChannels; c++) {
        channels[c][i] = view.getFloat32(i * stride + c * 4, isLE);
      }
    }
    return channels;
  }
  if (isFloat64) {
    const stride = numChannels * 8;
    for (let i = 0; i < numFrames; i++) {
      for (let c = 0; c < numChannels; c++) {
        channels[c][i] = view.getFloat64(i * stride + c * 8, isLE);
      }
    }
    return channels;
  }

  // Integer PCM
  if (![8, 16, 24, 32].includes(bitDepth)) {
    throw new Error(`Unsupported AIFF bit depth: ${bitDepth}`);
  }
  if (ct !== 'none' && ct !== 'twos' && ct !== 'sowt' && compressionType !== '') {
    throw new Error(`Unsupported AIFC compression: ${compressionType}`);
  }

  const bytesPerSample = bitDepth / 8;
  const stride = numChannels * bytesPerSample;

  for (let i = 0; i < numFrames; i++) {
    for (let c = 0; c < numChannels; c++) {
      const o = i * stride + c * bytesPerSample;
      let val = 0;
      if (bitDepth === 8) {
        val = view.getInt8(o) / 0x80;
      } else if (bitDepth === 16) {
        val = view.getInt16(o, isLE) / 0x8000;
      } else if (bitDepth === 24) {
        // 24-bit signed; rebuild from 3 bytes with proper sign extension
        let high, mid, low;
        if (isLE) {
          low = view.getUint8(o);
          mid = view.getUint8(o + 1);
          high = view.getInt8(o + 2); // signed top byte → sign-extends through <<
        } else {
          high = view.getInt8(o);
          mid = view.getUint8(o + 1);
          low = view.getUint8(o + 2);
        }
        val = ((high << 16) | (mid << 8) | low) / 0x800000;
      } else if (bitDepth === 32) {
        val = view.getInt32(o, isLE) / 0x80000000;
      }
      channels[c][i] = val;
    }
  }
  return channels;
}

// WAV encoder (16-bit PCM)
function encodeWav(audioBuffer) {
  const numCh = audioBuffer.numberOfChannels;
  const sampleRate = audioBuffer.sampleRate;
  const length = audioBuffer.length;
  const bytesPerSample = 2;
  const blockAlign = numCh * bytesPerSample;
  const byteRate = sampleRate * blockAlign;
  const dataSize = length * blockAlign;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);

  function writeStr(off, str) {
    for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i));
  }

  writeStr(0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true); // fmt chunk size
  view.setUint16(20, 1, true); // PCM
  view.setUint16(22, numCh, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, 16, true); // bits per sample
  writeStr(36, 'data');
  view.setUint32(40, dataSize, true);

  // Interleave channels and write samples
  const channels = [];
  for (let c = 0; c < numCh; c++) channels.push(audioBuffer.getChannelData(c));

  let offset = 44;
  for (let i = 0; i < length; i++) {
    for (let c = 0; c < numCh; c++) {
      let s = Math.max(-1, Math.min(1, channels[c][i]));
      s = s < 0 ? s * 0x8000 : s * 0x7FFF;
      view.setInt16(offset, s, true);
      offset += 2;
    }
  }
  return buffer;
}

// MP3 encoder via lamejs
function encodeMp3(audioBuffer, kbps) {
  const numCh = Math.min(audioBuffer.numberOfChannels, 2);
  const sampleRate = audioBuffer.sampleRate;
  const encoder = new lamejs.Mp3Encoder(numCh, sampleRate, kbps);

  // lamejs expects Int16 PCM
  const left = audioBuffer.getChannelData(0);
  const right = numCh > 1 ? audioBuffer.getChannelData(1) : null;
  const samples = audioBuffer.length;

  const leftI16 = new Int16Array(samples);
  const rightI16 = right ? new Int16Array(samples) : null;
  for (let i = 0; i < samples; i++) {
    let l = Math.max(-1, Math.min(1, left[i]));
    leftI16[i] = l < 0 ? l * 0x8000 : l * 0x7FFF;
    if (right) {
      let r = Math.max(-1, Math.min(1, right[i]));
      rightI16[i] = r < 0 ? r * 0x8000 : r * 0x7FFF;
    }
  }

  const blockSize = 1152;
  const chunks = [];
  for (let i = 0; i < samples; i += blockSize) {
    const lChunk = leftI16.subarray(i, i + blockSize);
    let buf;
    if (right) {
      const rChunk = rightI16.subarray(i, i + blockSize);
      buf = encoder.encodeBuffer(lChunk, rChunk);
    } else {
      buf = encoder.encodeBuffer(lChunk);
    }
    if (buf.length > 0) chunks.push(buf);
  }
  const tail = encoder.flush();
  if (tail.length > 0) chunks.push(tail);

  // Concatenate
  let total = 0;
  chunks.forEach(c => total += c.length);
  const out = new Uint8Array(total);
  let off = 0;
  chunks.forEach(c => { out.set(c, off); off += c.length; });
  return out;
}

// ============ DYNAMIC SCRIPT LOADER ============
const _scriptCache = {};
function loadScript(src) {
  if (_scriptCache[src]) return _scriptCache[src];
  _scriptCache[src] = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.async = true;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error(`Failed to load ${src}`));
    document.head.appendChild(s);
  });
  return _scriptCache[src];
}

// ============ HEIC CONVERTER ============
// Uses libheif-js v1.19.x — current upstream port of libheif (the standard
// HEIF/HEIC codec library). Replaced heic2any (2019, fails on modern iPhone
// HEIC with HEVC + depth maps + multi-image effects).
let _libheifPromise = null;
async function loadLibHeif() {
  if (_libheifPromise) return _libheifPromise;
  _libheifPromise = (async () => {
    await loadScript('https://cdn.jsdelivr.net/npm/libheif-js@1.19.8/libheif-wasm/libheif-bundle.js');
    if (!window.libheif) throw new Error('libheif-js failed to load from CDN');
    // libheif() is an emscripten-style async loader returning the module
    const lib = await window.libheif();
    return lib;
  })();
  return _libheifPromise;
}

async function convertHeic(f) {
  const formats = f.options.formats || ['jpg'];
  if (formats.length === 0) throw new Error('Pick at least one output format');

  setStatus(f, 'converting', 'loading HEIC decoder (~1.5MB)...');
  const lib = await loadLibHeif();

  setStatus(f, 'converting', 'decoding HEIC...');
  const decoder = new lib.HeifDecoder();
  const buf = new Uint8Array(await f.file.arrayBuffer());

  let images;
  try {
    images = decoder.decode(buf);
  } catch (err) {
    throw new Error(`HEIC decode failed: ${err.message || err}`);
  }
  if (!images || images.length === 0) {
    throw new Error('HEIC decoder returned no images. The file may be corrupt or use an unsupported variant.');
  }

  const baseName = stripExt(f.file.name);

  for (let i = 0; i < images.length; i++) {
    const heifImg = images[i];
    const w = heifImg.get_width();
    const h = heifImg.get_height();

    setStatus(f, 'converting', `rendering image ${i + 1}/${images.length}...`);

    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    const imageData = ctx.createImageData(w, h);

    await new Promise((resolve, reject) => {
      try {
        heifImg.display(imageData, (result) => {
          if (!result) reject(new Error('HEIC display callback returned null'));
          else resolve();
        });
      } catch (err) {
        reject(err);
      }
    });
    ctx.putImageData(imageData, 0, 0);

    for (const fmt of formats) {
      setStatus(f, 'converting', `encoding ${fmt}...`);
      let outCanvas = canvas;
      if (fmt === 'jpg') {
        // JPG has no alpha — composite over white
        const c2 = document.createElement('canvas');
        c2.width = w; c2.height = h;
        const ctx2 = c2.getContext('2d');
        ctx2.fillStyle = '#FFFFFF';
        ctx2.fillRect(0, 0, w, h);
        ctx2.drawImage(canvas, 0, 0);
        outCanvas = c2;
      }
      const blob = await canvasToBlob(outCanvas, fmt, f.options.quality ?? 0.92);
      const suffix = images.length > 1 ? `-${String(i + 1).padStart(2, '0')}` : '';
      f.results.push({ name: `${baseName}${suffix}.${fmt}`, blob });
    }
  }
}

// ============ VIDEO CONVERTER ============
// MP4 / MOV / M4V are all ISO base media files containing the same H.264/AAC
// streams — the only meaningful difference is the brand identifier in the ftyp
// atom at the start. We can flip the brand bytes in place without re-encoding.
// CRITICAL: ftyp size MUST stay identical, otherwise all internal byte offsets
// (chunk offsets in moov/stco) become wrong and the file breaks. So we swap
// brand bytes in place rather than rebuilding the atom.
function remuxIsoBrand(arrayBuffer, targetFormat) {
  const u8 = new Uint8Array(arrayBuffer);
  if (u8.byteLength < 16) throw new Error('File too short to be a valid MP4/MOV');

  const dv = new DataView(u8.buffer, u8.byteOffset, u8.byteLength);
  const ftypSize = dv.getUint32(0, false);
  const atomType = String.fromCharCode(u8[4], u8[5], u8[6], u8[7]);

  if (atomType !== 'ftyp') {
    throw new Error('First atom is not ftyp — non-standard MP4/MOV layout');
  }
  if (ftypSize === 1) {
    throw new Error('ftyp uses extended 64-bit size (unusual)');
  }
  if (ftypSize < 16 || ftypSize > u8.byteLength) {
    throw new Error('ftyp size invalid');
  }

  const brands = {
    mp4: { major: 'mp42', firstCompat: 'isom' },
    m4v: { major: 'M4V ', firstCompat: 'mp42' },
    mov: { major: 'qt  ', firstCompat: 'qt  ' },
  };
  const b = brands[targetFormat];
  if (!b) throw new Error(`Unsupported target format: ${targetFormat}`);

  // Copy only the ftyp bytes (small) and modify brand fields. Rest of file is
  // referenced via Blob parts so we don't double its memory.
  const newFtyp = new Uint8Array(ftypSize);
  newFtyp.set(u8.subarray(0, ftypSize));
  for (let i = 0; i < 4; i++) newFtyp[8 + i] = b.major.charCodeAt(i);
  if (ftypSize >= 20) {
    for (let i = 0; i < 4; i++) newFtyp[16 + i] = b.firstCompat.charCodeAt(i);
  }

  return [newFtyp, u8.subarray(ftypSize)];
}

let _ffmpegPromise = null;
async function loadFFmpeg() {
  if (_ffmpegPromise) return _ffmpegPromise;
  if (typeof SharedArrayBuffer === 'undefined') {
    throw new Error('Re-encoding video requires SharedArrayBuffer, which needs cross-origin isolation. This works at c0nvert.app deployment with COOP/COEP headers, but not in the artifact preview. MP4↔MOV stream copy still works here.');
  }
  _ffmpegPromise = (async () => {
    await loadScript('https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js');
    if (!window.FFmpeg) throw new Error('ffmpeg.wasm failed to load');
    const { createFFmpeg } = window.FFmpeg;
    const instance = createFFmpeg({
      log: false,
      corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
    });
    await instance.load();
    return instance;
  })();
  return _ffmpegPromise;
}

function videoCanStreamCopy(inExt, outExt) {
  const isoFamily = ['mp4', 'mov', 'm4v'];
  return isoFamily.includes(inExt) && isoFamily.includes(outExt);
}

async function convertVideo(f) {
  const formats = f.options.formats || [];
  if (formats.length === 0) throw new Error('Pick at least one output format');

  const baseName = stripExt(f.file.name);

  // Cache the file's bytes once if any format needs them (all do)
  let buf = null;
  const ensureBuf = async () => {
    if (!buf) {
      setStatus(f, 'converting', 'reading file...');
      buf = await f.file.arrayBuffer();
    }
    return buf;
  };

  for (const fmt of formats) {
    if (videoCanStreamCopy(f.ext, fmt)) {
      // Pure-JS brand swap, no ffmpeg needed
      const data = await ensureBuf();
      setStatus(f, 'converting', `rewriting ${fmt.toUpperCase()} container...`);
      const parts = remuxIsoBrand(data, fmt);
      const mime = fmt === 'mov' ? 'video/quicktime' : 'video/mp4';
      const blob = new Blob(parts, { type: mime });
      f.results.push({ name: `${baseName}.${fmt}`, blob });
    } else {
      // Re-encode path needs ffmpeg.wasm
      setStatus(f, 'converting', 'loading video engine (~25MB)...');
      const ffmpeg = await loadFFmpeg();
      const { fetchFile } = window.FFmpeg;
      const inName = `input.${f.ext}`;
      const outName = `output.${fmt}`;
      setStatus(f, 'converting', `preparing ${fmt.toUpperCase()} encode...`);
      ffmpeg.FS('writeFile', inName, await fetchFile(f.file));

      const args = fmt === 'webm'
        ? ['-i', inName, '-c:v', 'libvpx-vp9', '-b:v', '1M', '-c:a', 'libopus', outName]
        : ['-i', inName, '-c:v', 'libx264', '-preset', 'fast', '-crf', '22', '-c:a', 'aac', '-movflags', '+faststart', outName];

      ffmpeg.setProgress(({ ratio }) => {
        if (ratio > 0 && ratio <= 1) {
          const pct = Math.round(ratio * 100);
          setStatus(f, 'converting', `encoding ${fmt.toUpperCase()} ${pct}%...`);
        }
      });

      try {
        await ffmpeg.run(...args);
      } catch (err) {
        try { ffmpeg.FS('unlink', inName); } catch {}
        throw new Error(`${fmt.toUpperCase()} re-encode failed: ${err.message || 'ffmpeg error'}`);
      }

      let data;
      try {
        data = ffmpeg.FS('readFile', outName);
      } catch {
        throw new Error(`${fmt.toUpperCase()} encode produced no output`);
      }
      try { ffmpeg.FS('unlink', inName); } catch {}
      try { ffmpeg.FS('unlink', outName); } catch {}

      const mime = fmt === 'webm' ? 'video/webm' : `video/${fmt}`;
      f.results.push({ name: `${baseName}.${fmt}`, blob: new Blob([data.buffer], { type: mime }) });
    }
  }
}

// ============ DOWNLOAD ============
async function downloadResults(f) {
  if (f.results.length === 1) {
    const r = f.results[0];
    saveBlob(r.blob, r.name);
  } else {
    if (!window.JSZip) throw new Error('Zip library not loaded');
    const zip = new JSZip();
    f.results.forEach(r => zip.file(r.name, r.blob));
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const baseName = stripExt(f.file.name);
    saveBlob(zipBlob, `${baseName}-converted.zip`);
  }
}

function saveBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ============ HELPERS ============
function readAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error('File read failed'));
    reader.readAsDataURL(file);
  });
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('Could not load image'));
    img.src = src;
  });
}

function canvasToBlob(canvas, format, quality) {
  return new Promise((resolve, reject) => {
    const mime = format === 'jpg' ? 'image/jpeg' : `image/${format}`;
    canvas.toBlob(b => b ? resolve(b) : reject(new Error('Canvas encoding failed')), mime, quality);
  });
}

function stripExt(name) {
  return name.replace(/\.[^.]+$/, '');
}
